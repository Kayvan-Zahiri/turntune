name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: lint + test (offline fixtures only)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install ".[dev]"
      - name: Lint
        run: |
          ruff format --check .
          ruff check .
      # The suite runs entirely against bundled fixtures in tests/data —
      # no Hugging Face download, no network, no model fetch.
      - name: Test
        run: pytest
